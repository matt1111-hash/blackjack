# =============================================================================
# .quality_gate.conf - Testreszabható küszöbértékek
# =============================================================================
# Ez a fájl felülírja a quality_gate.sh alapértékeit.
# CLI flag-ek (--ci, --strict, --no-coverage) ezeket is felülírják.
# =============================================================================

# Coverage threshold (%)
COVERAGE_THRESHOLD=85

# Maximum file size (lines)
MAX_FILE_LINES=300

# Skip coverage check entirely (true/false)
# Használd ha nincs TensorFlow/GPU a környezetben
SKIP_COVERAGE=false

# CI/Strict mode-ban automatikusan:
#   COVERAGE_THRESHOLD=90
#   MAX_FILE_LINES=250
#   SKIP_COVERAGE=false (mindig ellenőrzi)
