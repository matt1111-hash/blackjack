name: 🔒 Heti Biztonsági Ellenőrzés

on:
  schedule:
    - cron: '0 6 * * MON'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  osv-scan:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Kód letöltése
      uses: actions/checkout@v4

    - name: 🔍 OSV-Scanner
      uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2
      with:
        scan-args: |-
          --lockfile=package-lock.json
          ./
