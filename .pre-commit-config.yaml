# =============================================================================
# PRE-COMMIT - Merged Edition v3.1
# =============================================================================

default_language_version:
  python: python3.10

repos:
  # ---------------------------------------------------------------------------
  # BASICS
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: debug-statements
      - id: detect-private-key

  # ---------------------------------------------------------------------------
  # RUFF - Lint + Format
  # FIXED: verzió szinkronban a requirements-szel (>=0.8.0)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # MYPY
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, types-requests]
        args: [--ignore-missing-imports]

  # ---------------------------------------------------------------------------
  # ARCHITECTURE (ha van .importlinter)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: import-linter
        name: architecture check
        entry: bash -c 'if [ -f .importlinter ]; then lint-imports; else echo "No .importlinter - skipped"; fi'
        language: system
        pass_filenames: false
        always_run: true

  # ---------------------------------------------------------------------------
  # COMPLEXITY
  # FIXED: dinamikus src detekció
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: complexity
        name: complexity check
        entry: bash -c 'SRC=$(for d in src app lib; do [ -d "$d" ] && echo "$d" && break; done); command -v radon >/dev/null && radon cc "${SRC:-.}" -a -nc || true'
        language: system
        pass_filenames: false
        types: [python]

  # ---------------------------------------------------------------------------
  # QUICK TEST
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: pytest
        name: quick test
        entry: pytest
        language: system
        args: [-x, -q, --no-cov, -m, "not slow"]
        pass_filenames: false
        stages: [pre-commit]

  # ---------------------------------------------------------------------------
  # SECRETS
  # FIXED: baseline fájl nélkül is működik
  # ---------------------------------------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package.lock.json
        # NOTE: első használat előtt futtasd:
        #   detect-secrets scan > .secrets.baseline
